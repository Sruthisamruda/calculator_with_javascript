<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Explore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Travel Explore</h1>
        <p>Your Adventure Awaits!</p>
    </header>
    <section>
        <h2>Discover Amazing Destinations</h2>
        <p>Start your journey with us and explore the world's most beautiful places.</p>
        <a href="#contact" class="btn">Get Started</a>
    </section>
    <section id="contact">
        <h2>Contact Us</h2>
        <p>Have questions? Reach out to us!</p>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <input type="submit" value="Submit" class="btn">
        </form>
    </section>
    <section id="calculator">
        <h2>Calculator</h2>
        <div id="calculator-container">
            <input type="text" id="display" disabled>
            <div class="button-row">
                <button onclick="clearDisplay()">C</button>
                <button onclick="appendToDisplay('/')">/</button>
                <button onclick="appendToDisplay('*')">*</button>
            </div>
            <div class="button-row">
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('-')">-</button>
            </div>
            <div class="button-row">
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('+')">+</button>
            </div>
            <div class="button-row">
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="calculate()">=</button>
            </div>
            <div class="button-row">
                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('.')">.</button>
            </div>
        </div>
    </section>
    <footer>
        <p>&copy; 2024 Travel Explore. All rights reserved.</p>
    </footer>
    <script src="calculator.js"></script>
</body>
</html>
